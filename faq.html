<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FAQ — Zanith Crafted Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --navy:#1e2d4a; --navy-light:#2a3f63; --gold:#c8974a; --gold-light:#e8b86d;
  --cream:#faf7f2; --warm:#f3ede3; --muted:#8a9bb5; --text:#1a2332;
  --text-soft:#5a6a7e; --white:#fff; --border:#e2ddd6; --green:#2e7d52;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Instrument Sans',sans-serif;background:var(--cream);color:var(--text);}

/* HEADER */
header{background:var(--white);border-bottom:1px solid var(--border);padding:0.9rem 1.5rem;display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);}
.logo-icon{width:36px;height:36px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.logo-name{font-family:'Fraunces',serif;font-size:1rem;font-weight:500;color:var(--navy);}
.logo-sub{font-size:0.62rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
.back-btn{display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-soft);font-size:0.82rem;padding:0.4rem 0.9rem;border:1px solid var(--border);border-radius:20px;transition:all 0.15s;}
.back-btn:hover{color:var(--navy);border-color:var(--navy);}

/* HERO */
.hero{background:var(--navy);color:white;padding:3.5rem 1.5rem 3rem;text-align:center;}
.hero-eyebrow{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--gold-light);margin-bottom:0.75rem;}
.hero-title{font-family:'Fraunces',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:500;line-height:1.2;margin-bottom:0.75rem;}
.hero-title em{font-style:italic;color:var(--gold-light);}
.hero-sub{font-size:0.9rem;color:rgba(255,255,255,0.65);max-width:480px;margin:0 auto 1.5rem;}
.hero-search{max-width:400px;margin:0 auto;position:relative;}
.hero-search input{width:100%;padding:0.7rem 1rem 0.7rem 2.5rem;border-radius:30px;border:none;font-size:0.85rem;font-family:inherit;outline:none;background:rgba(255,255,255,0.12);color:white;}
.hero-search input::placeholder{color:rgba(255,255,255,0.4);}
.hero-search input:focus{background:rgba(255,255,255,0.2);}
.search-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);opacity:0.5;font-size:0.9rem;}

/* MAIN */
.main{max-width:780px;margin:0 auto;padding:3rem 1.5rem;}

/* CATEGORIES */
.cat-bar{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2.5rem;}
.cat-btn{padding:0.4rem 1rem;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:0.78rem;font-family:inherit;cursor:pointer;color:var(--text-soft);transition:all 0.15s;}
.cat-btn:hover,.cat-btn.active{background:var(--navy);border-color:var(--navy);color:white;}

/* FAQ GROUP */
.faq-group{margin-bottom:2.5rem;}
.faq-group-title{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:2px solid var(--warm);}
.faq-item{border-bottom:1px solid var(--border);}
.faq-q{width:100%;text-align:left;background:none;border:none;padding:1rem 0;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;font-family:'Instrument Sans',sans-serif;font-size:0.9rem;font-weight:600;color:var(--text);line-height:1.4;transition:color 0.15s;}
.faq-q:hover{color:var(--navy);}
.faq-q .num{font-size:0.65rem;color:var(--muted);font-weight:400;margin-top:3px;flex-shrink:0;min-width:18px;}
.faq-q .qtxt{flex:1;}
.faq-arrow{flex-shrink:0;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.7rem;transition:all 0.25s;color:var(--muted);margin-top:1px;}
.faq-item.open .faq-arrow{transform:rotate(180deg);background:var(--navy);border-color:var(--navy);color:white;}
.faq-a{max-height:0;overflow:hidden;transition:max-height 0.32s ease,padding 0.2s;font-size:0.85rem;color:var(--text-soft);line-height:1.8;padding-left:26px;}
.faq-item.open .faq-a{max-height:600px;padding:0 0 1.1rem 26px;}
.faq-a a{color:var(--navy);font-weight:600;}
.faq-a .highlight{display:inline-block;background:var(--warm);border-radius:5px;padding:1px 7px;font-weight:600;color:var(--navy);font-size:0.82rem;}

/* CONTACT CTA */
.contact-section{background:var(--navy);border-radius:16px;padding:2.5rem;text-align:center;margin-top:3rem;}
.contact-section h3{font-family:'Fraunces',serif;font-size:1.4rem;color:white;margin-bottom:0.5rem;}
.contact-section p{font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:1.5rem;}
.contact-btns{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;}
.btn-gold{background:var(--gold);color:var(--navy);border:none;padding:0.7rem 1.5rem;border-radius:10px;font-family:inherit;font-size:0.85rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline-white{background:transparent;color:white;border:1.5px solid rgba(255,255,255,0.3);padding:0.7rem 1.5rem;border-radius:10px;font-family:inherit;font-size:0.85rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;}
.btn-outline-white:hover{border-color:white;background:rgba(255,255,255,0.08);}

/* LANG TOGGLE */
.lang-toggle{display:flex;gap:4px;}
.lang-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:none;font-size:0.72rem;cursor:pointer;font-family:inherit;color:var(--text-soft);}
.lang-btn.active{background:var(--navy);color:white;border-color:var(--navy);}

/* NO RESULTS */
.no-results{text-align:center;padding:3rem;color:var(--muted);font-size:0.875rem;display:none;}
.no-results.show{display:block;}

@media(max-width:600px){
  .hero{padding:2.5rem 1rem 2rem;}
  .main{padding:2rem 1rem;}
  .contact-section{padding:1.75rem 1.25rem;}
}

/* LICENSE TIERS */
.license-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.25rem 0 0.75rem;}
@media(max-width:600px){.license-tiers{grid-template-columns:1fr;}}
.tier-card{border:1.5px solid var(--border);border-radius:12px;padding:1.1rem 1.1rem 1rem;background:var(--white);position:relative;}
.tier-card.featured{border-color:var(--gold);background:linear-gradient(135deg,#fffbf4,#fdf6e9);}
.tier-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--gold);color:white;font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:0.18rem 0.65rem;border-radius:20px;white-space:nowrap;}
.tier-icon{font-size:1.3rem;margin-bottom:0.35rem;}
.tier-name{font-family:'Fraunces',serif;font-size:0.95rem;font-weight:500;color:var(--navy);margin-bottom:0.15rem;}
.tier-price{font-size:0.75rem;color:var(--gold);font-weight:700;margin-bottom:0.15rem;}
.tier-limit{font-size:0.72rem;font-weight:700;color:var(--green);background:#edf7f1;border-radius:6px;padding:0.25rem 0.5rem;display:inline-block;margin-bottom:0.6rem;}
.tier-list{list-style:none;font-size:0.76rem;color:var(--text-soft);line-height:1.7;}
.tier-list li::before{content:'✓ ';color:var(--green);}
.tier-list li.no{color:#b0b8c4;}
.tier-list li.no::before{content:'✗ ';color:#e0a0a0;}
.tier-cta{display:inline-block;margin-top:0.8rem;padding:0.35rem 0.85rem;background:var(--navy);color:white;border-radius:20px;font-size:0.72rem;font-weight:600;text-decoration:none;transition:background 0.15s;}
.tier-cta:hover{background:var(--navy-light);}
.tier-cta.gold{background:var(--gold);}
.tier-cta.gold:hover{background:#b8843a;}
.upsell-bar{background:linear-gradient(135deg,var(--navy),#2a3f63);border-radius:12px;padding:1.1rem 1.4rem;color:white;margin:1.1rem 0 0.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.upsell-bar-text h4{font-family:'Fraunces',serif;font-size:0.92rem;color:var(--gold-light);margin-bottom:0.15rem;}
.upsell-bar-text p{font-size:0.78rem;color:rgba(255,255,255,0.7);line-height:1.5;}
.upsell-bar a{flex-shrink:0;background:var(--gold);color:white;text-decoration:none;padding:0.45rem 1rem;border-radius:20px;font-size:0.76rem;font-weight:700;margin-left:auto;}
.upsell-bar a:hover{background:#b8843a;}
.contact-card{background:var(--navy);color:white;border-radius:14px;padding:2rem;text-align:center;margin-top:3rem;}
.contact-card h3{font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:0.5rem;}
.contact-card p{font-size:0.85rem;color:rgba(255,255,255,0.65);margin-bottom:1.25rem;}
.contact-card a{background:var(--gold);color:white;text-decoration:none;padding:0.65rem 1.5rem;border-radius:24px;font-weight:600;font-size:0.85rem;display:inline-block;}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <div class="logo-icon">🌿</div>
    <div>
      <div class="logo-name">Zanith Crafted Studio</div>
      <div class="logo-sub">Handcrafted Digital & Print Goods</div>
    </div>
  </a>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnEN" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btnVI" onclick="setLang('vi')">VI</button>
    </div>
    <a href="index.html" class="back-btn">← <span class="en">Back to Shop</span><span class="vi" style="display:none">Về Shop</span></a>
  </div>
</header>
<div class="hero">
  <div class="hero-eyebrow" id="heroEyebrow">Help Center</div>
  <h1 class="hero-title" id="heroTitle">Frequently Asked <em>Questions</em></h1>
  <p class="hero-sub" id="heroSub"></p>
  <div class="hero-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" oninput="renderFAQ()" placeholder="Search questions…">
  </div>
</div>

<div class="main">
  <div class="cat-bar" id="catBar"></div>
  <div id="faqContainer"></div>
  <div class="contact-card">
    <h3 id="ctaH"></h3>
    <p id="ctaP"></p>
    <a href="mailto:zenithcraftedstudio@gmail.com">✉ zenithcraftedstudio@gmail.com</a>
  </div>
</div>

<script>
var currentLang = localStorage.getItem('zanith_lang') || 'en';
var currentCat  = 'all';

// ─── TIER HTML ──────────────────────────────────────────────────
function makeTiers(l) {
  var isVI = l === 'vi';
  return '<div class="license-tiers">'

  // BASIC
  + '<div class="tier-card">'
  + '<div class="tier-icon">🌱</div>'
  + '<div class="tier-name">'+(isVI?'Cơ Bản':'Basic')+'</div>'
  + '<div class="tier-price">'+(isVI?'Miễn phí — có sẵn khi mua':'Free — included with purchase')+'</div>'
  + '<div class="tier-limit">≤ 500 items / '+(isVI?'năm':'year')+'</div>'
  + '<ul class="tier-list">'
  + '<li>'+(isVI?'POD cá nhân & shop nhỏ':'Personal & small-shop POD')+'</li>'
  + '<li>'+(isVI?'Etsy, Shopee, sàn thương mại':'Etsy, Shopee, marketplaces')+'</li>'
  + '<li>'+(isVI?'Hàng vật lý, template kỹ thuật số':'Physical goods, digital templates')+'</li>'
  + '<li>'+(isVI?'1 tài khoản bán hàng':'1 seller account only')+'</li>'
  + '<li class="no">'+(isVI?'Không bán sỉ / sản xuất đại trà':'No wholesale / mass production')+'</li>'
  + '<li class="no">'+(isVI?'Không dùng cho khách hàng / client':'No client or branding work')+'</li>'
  + '</ul>'
  + '<span style="display:inline-block;margin-top:0.8rem;font-size:0.72rem;color:var(--green);font-weight:600">✓ '+(isVI?'Tự động bao gồm':'Automatically included')+'</span>'
  + '</div>'

  // PREMIUM
  + '<div class="tier-card featured">'
  + '<div class="tier-badge">'+(isVI?'Phổ biến nhất':'Most Popular')+'</div>'
  + '<div class="tier-icon">✨</div>'
  + '<div class="tier-name">'+(isVI?'Nâng Cao':'Premium')+'</div>'
  + '<div class="tier-price">+$8 / pattern — '+(isVI?'một lần':'one-time')+'</div>'
  + '<div class="tier-limit">≤ 5,000 items / '+(isVI?'năm':'year')+'</div>'
  + '<ul class="tier-list">'
  + '<li>'+(isVI?'Mọi sàn & nhiều store cùng lúc':'All platforms & multi-store')+'</li>'
  + '<li>'+(isVI?'Bán sỉ & xưởng in nhỏ':'Wholesale & small print studios')+'</li>'
  + '<li>'+(isVI?'Thiết kế cho khách / client work':'Client work & branding projects')+'</li>'
  + '<li>'+(isVI?'Bao bì & nhãn sản phẩm':'Product packaging & labels')+'</li>'
  + '<li class="no">'+(isVI?'Không sản xuất đại trà / nhà máy':'No factory-scale mass production')+'</li>'
  + '<li class="no">'+(isVI?'Không cấp lại license cho người khác':'No sub-licensing to others')+'</li>'
  + '</ul>'
  + '<a href="mailto:zenithcraftedstudio@gmail.com?subject=Premium License Upgrade&body='+(isVI?'Chào, tôi muốn nâng cấp Premium License. Mã đơn: ':'Hi, I want to upgrade to Premium License. Order #: ')+'" class="tier-cta gold">'+(isVI?'Nâng cấp — $8':'Upgrade — $8')+'</a>'
  + '</div>'

  // EXTENDED
  + '<div class="tier-card">'
  + '<div class="tier-icon">🏢</div>'
  + '<div class="tier-name">'+(isVI?'Mở Rộng':'Extended')+'</div>'
  + '<div class="tier-price">+$25 / pattern — '+(isVI?'một lần':'one-time')+'</div>'
  + '<div class="tier-limit">♾️ Unlimited items</div>'
  + '<ul class="tier-list">'
  + '<li><strong>'+(isVI?'Không giới hạn số lượng sản phẩm':'Unlimited items, no annual cap')+'</strong></li>'
  + '<li>'+(isVI?'Sản xuất đại trà & nhà máy':'Factory-scale & mass production')+'</li>'
  + '<li>'+(isVI?'Nhận diện thương hiệu & bao bì doanh nghiệp':'Brand identity & corporate packaging')+'</li>'
  + '<li>'+(isVI?'Nhiều đơn vị kinh doanh cùng chủ':'Multiple entities, same ownership')+'</li>'
  + '<li>'+(isVI?'Bán lại trong kit / bundle thiết kế':'Resale inside design kits or bundles')+'</li>'
  + '<li>'+(isVI?'Hóa đơn chính thức & hỗ trợ ưu tiên':'Official invoice & priority support')+'</li>'
  + '</ul>'
  + '<a href="mailto:zenithcraftedstudio@gmail.com?subject=Extended License Inquiry&body='+(isVI?'Chào, tôi muốn Extended License. Mục đích: ':'Hi, I want an Extended License. Use case: ')+'" class="tier-cta">'+(isVI?'Liên hệ':'Contact Us')+'</a>'
  + '</div>'

  + '</div>'

  // upsell bar
  + '<div class="upsell-bar">'
  + '<div class="upsell-bar-text">'
  + '<h4>'+(isVI?'Đang mở rộng kinh doanh?':'Scaling up your business?')+'</h4>'
  + '<p>'+(isVI?'Nâng cấp bất kỳ lúc nào sau khi mua — email kèm mã đơn, trả 1 lần, không gia hạn hàng năm.':'Upgrade any time after purchase — email your order number. One-time fee, no annual renewal.')+'</p>'
  + '</div>'
  + '<a href="mailto:zenithcraftedstudio@gmail.com?subject='+(isVI?'Yeu Cau Nang Cap License':'License Upgrade Request')+'">'+(isVI?'Nâng cấp →':'Upgrade →')+'</a>'
  + '</div>';
}

// ─── COPYRIGHT HTML ─────────────────────────────────────────────
function makeCopyright(l) {
  var isVI = l === 'vi';
  if (isVI) return ''
    + '<p style="margin-bottom:0.75rem">Tất cả họa tiết của Zanith Crafted Studio là <strong>tác phẩm gốc được bảo vệ bởi luật bản quyền</strong>. Bán lại hoặc phân phối file PNG gốc là vi phạm pháp lý.</p>'
    + '<p style="font-size:0.82rem;color:var(--text-soft);line-height:1.8;margin-bottom:0.75rem">'
    + '<strong>Cách chúng tôi bảo vệ tác phẩm:</strong><br>'
    + '🔐 File nhúng <strong>metadata ẩn (IPTC/XMP)</strong> ghi rõ tác giả, ngày tạo, loại license<br>'
    + '🔍 Thường xuyên <strong>tìm kiếm hình ảnh ngược</strong> (Google, TinEye, Etsy Visual Search)<br>'
    + '🛡️ Ảnh preview có <strong>watermark vô hình</strong> — mỗi ảnh nhúng định danh duy nhất<br>'
    + '⚖️ Gửi DMCA ngay khi phát hiện vi phạm trên bất kỳ nền tảng nào</p>'
    + '<p style="font-size:0.82rem;color:var(--text-soft);line-height:1.8">'
    + '<strong>Trách nhiệm của bạn:</strong><br>'
    + 'Giữ bí mật link tải. Không chia sẻ file PNG gốc. Nếu vượt giới hạn items của gói, hãy nâng cấp trước khi tiếp tục bán.</p>';
  return ''
    + '<p style="margin-bottom:0.75rem">All Zanith Crafted Studio patterns are <strong>original artworks protected by copyright</strong>. Reselling or redistributing the original PNG files is a legal violation.</p>'
    + '<p style="font-size:0.82rem;color:var(--text-soft);line-height:1.8;margin-bottom:0.75rem">'
    + '<strong>How we protect our work:</strong><br>'
    + '🔐 All files contain <strong>hidden embedded metadata (IPTC/XMP)</strong> with authorship, creation date &amp; license type<br>'
    + '🔍 We run regular <strong>reverse image searches</strong> (Google, TinEye, Etsy Visual Search)<br>'
    + '🛡️ Preview images use <strong>invisible watermark tracking</strong> — unique identifier per file<br>'
    + '⚖️ DMCA takedowns are filed immediately upon detecting infringement</p>'
    + '<p style="font-size:0.82rem;color:var(--text-soft);line-height:1.8">'
    + '<strong>Your responsibility:</strong><br>'
    + 'Keep your download link private. Do not share the original PNG. If you exceed your tier's item limit, upgrade before continuing to sell.</p>';
}

// ─── FAQ DATA ────────────────────────────────────────────────────
var FAQ = [
  { cat:'license',
    en_q:'What commercial license tiers do you offer?',
    vi_q:'Các gói commercial license của bạn là gì?',
    get en_a(){ return 'Every purchase automatically includes a <strong>Basic License</strong> — no extra cost. Two paid upgrades are available for sellers who scale up:<br><br>' + makeTiers('en'); },
    get vi_a(){ return 'Mỗi lần mua tự động bao gồm <strong>License Cơ Bản</strong> — miễn phí. Hai gói nâng cấp cho người bán ở quy mô lớn hơn:<br><br>' + makeTiers('vi'); }
  },
  { cat:'license',
    en_q:'Can I use these patterns on Etsy, Shopee, or other marketplaces?',
    vi_q:'Có thể dùng họa tiết để bán trên Etsy, Shopee không?',
    en_a:'Absolutely — sell finished products (t-shirts, mugs, prints, tote bags) on any marketplace. Basic License covers up to <strong>500 items/year</strong> on 1 seller account. Need more? Upgrade to Premium (5,000/year) or Extended (unlimited).',
    vi_a:'Hoàn toàn được — bán sản phẩm hoàn chỉnh (áo, cốc, tranh, túi) trên bất kỳ sàn nào. License Cơ Bản cho phép tối đa <strong>500 sản phẩm/năm</strong> trên 1 tài khoản. Cần nhiều hơn? Nâng cấp lên Nâng Cao (5.000/năm) hoặc Mở Rộng (unlimited).'
  },
  { cat:'license',
    en_q:'How do I upgrade my commercial license after purchase?',
    vi_q:'Làm sao nâng cấp license sau khi đã mua?',
    en_a:'Just email <a href="mailto:zenithcraftedstudio@gmail.com">zenithcraftedstudio@gmail.com</a> with your original order number and the pattern SKU. We'll confirm and send a payment link within 24 hours.<br><br>• <strong>Premium +$8/pattern</strong> → up to 5,000 items/year, multi-platform, wholesale, client work<br>• <strong>Extended +$25/pattern</strong> → unlimited items, factory use, brand identity, multi-entity',
    vi_a:'Chỉ cần email <a href="mailto:zenithcraftedstudio@gmail.com">zenithcraftedstudio@gmail.com</a> kèm mã đơn gốc và SKU họa tiết. Mình xác nhận và gửi link thanh toán trong 24 giờ.<br><br>• <strong>Nâng Cao +$8/họa tiết</strong> → tối đa 5.000 sản phẩm/năm, nhiều sàn, bán sỉ, client work<br>• <strong>Mở Rộng +$25/họa tiết</strong> → unlimited, nhà máy, nhận diện thương hiệu, nhiều doanh nghiệp'
  },

var CAT_NAMES = {
  license:  { en:'License & Copyright',  vi:'Bản Quyền & Giấy Phép' },
  download: { en:'Download & Delivery',  vi:'Tải File & Giao Hàng' },
  payment:  { en:'Payment & Refunds',    vi:'Thanh Toán & Hoàn Tiền' },
  product:  { en:'Products & Quality',   vi:'Sản Phẩm & Chất Lượng' },
  custom:   { en:'Custom Orders',        vi:'Đặt Hàng Tùy Chỉnh' }
};

var CATS = [
  { id:'all',      en:'All Topics',    vi:'Tất cả' },
  { id:'license',  en:'License',       vi:'Bản quyền' },
  { id:'download', en:'Download',      vi:'Tải file' },
  { id:'payment',  en:'Payment',       vi:'Thanh toán' },
  { id:'product',  en:'Product',       vi:'Sản phẩm' },
  { id:'custom',   en:'Custom Orders', vi:'Đặt hàng' }
];

function setLang(l) {
  currentLang = l;
  localStorage.setItem('zanith_lang', l);
  document.getElementById('btnEN').classList.toggle('active', l==='en');
  document.getElementById('btnVI').classList.toggle('active', l==='vi');
  var isVI = l==='vi';
  document.getElementById('heroSub').textContent = isVI
    ? 'Mọi thứ bạn cần biết về họa tiết, giấy phép và đơn hàng.'
    : 'Everything you need to know about our patterns, licenses, and orders.';
  document.getElementById('ctaH').textContent = isVI ? 'Vẫn còn thắc mắc?' : 'Still have questions?';
  document.getElementById('ctaP').textContent = isVI
    ? 'Không tìm thấy câu trả lời? Chúng tôi thường trả lời trong 24 giờ.'
    : "Can't find your answer? We usually reply within 24 hours.";
  document.getElementById('backBtnTxt').textContent = isVI ? '<span id="backBtnTxt">← Back to Shop</span>' : '← Back to Shop';
  renderCats();
  renderFAQ();
}

function renderCats() {
  document.getElementById('catBar').innerHTML = CATS.map(function(c){
    return '<button class="cat-btn'+(c.id===currentCat?' active':'')+'" onclick="filterCat(''+c.id+'')">'
      + c[currentLang] + '</button>';
  }).join('');
}

function filterCat(id) {
  currentCat = id;
  renderCats();
  renderFAQ();
}

function renderFAQ() {
  var q = (document.getElementById('searchInput').value||'').toLowerCase();
  var isVI = currentLang==='vi';
  var filtered = FAQ.filter(function(f){
    var matchCat = currentCat==='all' || f.cat===currentCat;
    var fq = (isVI?f.vi_q:f.en_q)||'';
    var fa = (isVI?f.vi_a:f.en_a)||'';
    var matchSearch = !q || fq.toLowerCase().indexOf(q)!==-1 || fa.toLowerCase().indexOf(q)!==-1;
    return matchCat && matchSearch;
  });

  var groups = {};
  var order = ['license','download','payment','product','custom'];
  order.forEach(function(c){ groups[c]=[]; });
  filtered.forEach(function(f){ groups[f.cat].push(f); });

  var html=''; var n=0;
  order.forEach(function(cid){
    if(!groups[cid].length) return;
    html += '<div class="faq-group">';
    if(currentCat==='all') html += '<div class="faq-group-title">'+CAT_NAMES[cid][currentLang]+'</div>';
    groups[cid].forEach(function(f){
      n++;
      var fq = isVI?f.vi_q:f.en_q;
      var fa = isVI?f.vi_a:f.en_a;
      html += '<div class="faq-item" id="fi'+n+'">'
        + '<button class="faq-q" onclick="toggleFAQ('+n+')">'
        + '<span class="num">'+String(n).padStart(2,'0')+'.</span>'
        + '<span class="qtxt">'+fq+'</span>'
        + '<span class="faq-arrow">▾</span>'
        + '</button>'
        + '<div class="faq-a">'+fa+'</div>'
        + '</div>';
    });
    html += '</div>';
  });

  if(!html) html='<p style="color:var(--muted);padding:2rem 0;font-size:0.88rem">No results found.</p>';
  document.getElementById('faqContainer').innerHTML = html;
}

function toggleFAQ(n) {
  var el = document.getElementById('fi'+n);
  var was = el.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(function(x){ x.classList.remove('open'); });
  if(!was) el.classList.add('open');
}

document.addEventListener('DOMContentLoaded', function(){
  setLang(currentLang);
  var hash = location.hash.replace('#','');
  if(hash && document.getElementById('fi1')) filterCat(hash);
});
</script>
